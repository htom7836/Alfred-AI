<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alfreid AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .chat-container {
            width: 700px;
            height: 90vh;
            background: #1a1a2e;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(99, 102, 241, 0.3);
        }

        .chat-header {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            padding: 20px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar {
            width: 45px;
            height: 45px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .header-info h1 {
            color: white;
            font-size: 18px;
            font-weight: 700;
        }

        .header-info p {
            color: rgba(255,255,255,0.7);
            font-size: 13px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .chat-box::-webkit-scrollbar {
            width: 5px;
        }

        .chat-box::-webkit-scrollbar-thumb {
            background: #6366f1;
            border-radius: 10px;
        }

        .message {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .bubble {
            max-width: 70%;
            padding: 12px 18px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.6;
        }

        .user .bubble {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .ai .bubble {
            background: #2a2a3e;
            color: #e2e8f0;
            border-bottom-left-radius: 4px;
        }

        .msg-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .ai .msg-avatar {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
        }

        .user .msg-avatar {
            background: #3a3a5e;
        }

        .typing-indicator {
            display: flex;
            align-items: flex-end;
            gap: 10px;
        }

        .typing-bubble {
            background: #2a2a3e;
            padding: 12px 18px;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #6366f1;
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }

        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-8px); }
        }

        .chat-input {
            padding: 20px;
            background: #1a1a2e;
            border-top: 1px solid #2a2a3e;
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 14px 20px;
            background: #2a2a3e;
            border: 2px solid transparent;
            border-radius: 30px;
            color: white;
            font-size: 14px;
            outline: none;
            transition: border 0.3s;
        }

        input:focus {
            border-color: #6366f1;
        }

        input::placeholder {
            color: #666;
        }

        button {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:hover {
            transform: scale(1.1);
        }

        .welcome-msg {
            text-align: center;
            color: #4a4a6a;
            font-size: 13px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="avatar">🎩</div>
            <div class="header-info">
                <h1>Alfred AI</h1>
                <p><span class="status-dot"></span>Always online, rarely wrong</p>
            </div>
        </div>

        <div class="chat-box" id="chat-box">
            <div class="message ai">
                <div class="msg-avatar">🎩</div>
                <div class="bubble">Good day! I am Alfred — your professional AI assistant with a refined sense of humor. How may I be of service today?</div>
            </div>
        </div>

        <div class="chat-input">
            <input type="text" id="user-input" placeholder="Type your message..." />
            <button onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        const input = document.getElementById('user-input');
        const chatBox = document.getElementById('chat-box');

        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') sendMessage();
        });

        function addTypingIndicator() {
            const div = document.createElement('div');
            div.className = 'typing-indicator';
            div.id = 'typing';
            div.innerHTML = `
                <div class="msg-avatar" style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:16px;">🎩</div>
                <div class="typing-bubble">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function removeTypingIndicator() {
            const typing = document.getElementById('typing');
            if (typing) typing.remove();
        }

        async function sendMessage() {
            const message = input.value.trim();
            if (!message) return;

            chatBox.innerHTML += `
                <div class="message user">
                    <div class="msg-avatar">👤</div>
                    <div class="bubble">${message}</div>
                </div>`;

            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            addTypingIndicator();

            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message })
            });

            const data = await response.json();
            removeTypingIndicator();

            chatBox.innerHTML += `
                <div class="message ai">
                    <div class="msg-avatar">🎩</div>
                    <div class="bubble">${data.reply}</div>
                </div>`;

            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
